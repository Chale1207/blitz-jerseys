[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Set these in the Netlify dashboard (Site configuration > Environment
# variables) — this file only documents what's required, it does not
# supply the values:
#   DATABASE_URL (dummy value is fine, e.g. "file:./unused.db" — required
#     by the Prisma schema but never actually used at runtime since the
#     Turso adapter takes over whenever TURSO_DATABASE_URL is set)
#   TURSO_DATABASE_URL
#   TURSO_AUTH_TOKEN
#   NEXT_PUBLIC_SITE_URL
#   NEXT_PUBLIC_WHATSAPP_NUMBER
#   NEXT_PUBLIC_INSTAGRAM_URL
#   NEXT_PUBLIC_FACEBOOK_URL
#   NEXT_PUBLIC_TIKTOK_URL
#   NEXT_PUBLIC_TWITTER_URL
